<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHK v2 Wiki - AHKv2 &amp; LLMs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-highlight@2.1.0/lib/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="highlight-ahk2.js"></script>
  <style>
    .wiki-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 24px;
      align-items: start;
      flex: 1;
    }

    @media (max-width: 768px) {
      .wiki-layout {
        grid-template-columns: 1fr;
        padding: 16px;
      }
      .wiki-toc { display: none; }
    }

    /* Table of Contents sidebar */
    .wiki-toc {
      position: sticky;
      top: 76px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      padding: 16px 0;
    }

    .wiki-toc::-webkit-scrollbar { width: 3px; }
    .wiki-toc::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .toc-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin: 0 0 12px;
      padding: 0 12px;
    }

    .toc-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .toc-list li a {
      display: block;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--text-secondary);
      border-left: 2px solid transparent;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .toc-list li a:hover {
      color: var(--text-primary);
      border-left-color: var(--border);
      background: rgba(255,255,255,0.02);
    }

    .toc-list li a.active {
      color: var(--accent);
      border-left-color: var(--accent);
    }

    .toc-list li.toc-h3 a {
      padding-left: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Wiki content */
    .wiki-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 36px 40px;
      line-height: 1.8;
      font-size: 15px;
    }

    .wiki-content h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.3px;
    }

    .wiki-content h1 + p {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 24px;
    }

    .wiki-content h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 2em 0 0.6em;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-muted);
      color: var(--text-primary);
    }

    .wiki-content h3 {
      font-size: 17px;
      font-weight: 600;
      margin: 1.5em 0 0.5em;
      color: var(--text-primary);
    }

    .wiki-content p {
      margin: 0 0 1em;
      color: var(--text-secondary);
    }

    .wiki-content strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .wiki-content hr {
      border: none;
      border-top: 1px solid var(--border-muted);
      margin: 2em 0;
    }

    .wiki-content ul, .wiki-content ol {
      margin: 0 0 1em 1.5em;
      color: var(--text-secondary);
    }

    .wiki-content li { margin: 0.3em 0; }

    .wiki-content a { border-bottom: 1px solid transparent; }
    .wiki-content a:hover { border-bottom-color: var(--accent); }

    .wiki-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }

    .wiki-content th {
      text-align: left;
      padding: 8px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-muted);
      color: var(--text-primary);
      font-weight: 600;
      font-size: 13px;
    }

    .wiki-content td {
      padding: 6px 12px;
      border: 1px solid var(--border-muted);
      color: var(--text-secondary);
    }

    .wiki-content pre {
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 20px;
      margin: 16px 0;
    }

    .wiki-content code {
      background: #252525;
      border: 1px solid #2a2a2a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
    }

    .wiki-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13.5px;
      line-height: 1.65;
    }

    /* Wiki metadata bar */
    .wiki-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-bottom: 16px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border-muted);
      font-size: 12px;
      color: var(--text-muted);
    }

    .wiki-meta .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">AHK</span>
        <span class="logo-text">v2 &amp; LLMs</span>
      </a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#posts" class="nav-link">Posts</a>
        <a href="wiki.html" class="nav-link" style="color: var(--accent);">Wiki</a>
        <a href="playground.html" class="nav-link">Playground</a>
        <a href="https://www.autohotkey.com/docs/v2/" target="_blank" class="nav-link">AHK Docs</a>
      </nav>
    </div>
  </header>

  <main class="wiki-layout">
    <nav class="wiki-toc">
      <h4 class="toc-title">Contents</h4>
      <ul class="toc-list" id="toc-list"></ul>
    </nav>

    <article class="wiki-content" id="wiki-content">
      <p class="loading">Loading wiki...</p>
    </article>
  </main>

  <footer class="site-footer">
    <span>&copy; 2025 AHKv2 &amp; LLMs</span>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="https://github.com/TrueCrimeDev/AHKv2_LLMs" target="_blank">GitHub</a>
    </div>
  </footer>

  <script>
    async function loadWiki() {
      try {
        const response = await fetch('wiki/ahk2-wiki.md');
        if (!response.ok) throw new Error('Wiki not found');
        const markdown = await response.text();

        marked.use(markedHighlight.markedHighlight({
          langPrefix: 'hljs language-',
          highlight: function(code, lang) {
            var mapped = (lang === 'cpp' || lang === 'ahk') ? 'ahk2' : lang;
            if (mapped && hljs.getLanguage(mapped)) {
              return hljs.highlight(code, { language: mapped }).value;
            }
            return hljs.highlight(code, { language: 'ahk2' }).value;
          }
        }));

        marked.setOptions({ breaks: true, gfm: true });

        const html = marked.parse(markdown);
        const content = document.getElementById('wiki-content');
        content.innerHTML = html;

        buildToc();
        setupScrollSpy();
      } catch (error) {
        document.getElementById('wiki-content').innerHTML =
          '<p>Error loading wiki: ' + error.message + '</p>';
      }
    }

    function buildToc() {
      const content = document.getElementById('wiki-content');
      const headings = content.querySelectorAll('h2, h3');
      const tocList = document.getElementById('toc-list');
      let tocHtml = '';

      headings.forEach(function(heading, i) {
        const id = 'section-' + i;
        heading.id = id;
        const level = heading.tagName === 'H3' ? 'toc-h3' : 'toc-h2';
        tocHtml += '<li class="' + level + '">' +
          '<a href="#' + id + '">' + heading.textContent + '</a></li>';
      });

      tocList.innerHTML = tocHtml;
    }

    function setupScrollSpy() {
      const links = document.querySelectorAll('.toc-list a');
      const headings = document.querySelectorAll('.wiki-content h2, .wiki-content h3');

      function onScroll() {
        let current = '';
        headings.forEach(function(heading) {
          if (heading.getBoundingClientRect().top <= 100) {
            current = heading.id;
          }
        });
        links.forEach(function(link) {
          link.classList.toggle('active',
            link.getAttribute('href') === '#' + current);
        });
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    }

    document.addEventListener('DOMContentLoaded', loadWiki);
  </script>
</body>
</html>
