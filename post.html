<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post - AHKv2 &amp; LLMs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=dark-system-2026-07">
  <link rel="stylesheet" href="ahk-eval-viz.css?v=2026-07b">

  <!-- syntax colors defined in style.css to match VS Code Dark+ -->
  <style>
    .article-container {
      max-width: 780px; width: 100%;
      margin: 0 auto;
      padding: 20px 24px;
      flex: 1;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      font-weight: 500;
    }

    .back-link:hover { color: var(--accent); }

    .article-header {
      padding: 0 0 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border-muted);
    }

    .article-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .article-title {
      margin: 0 0 10px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.3px;
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .article-body {
      background: var(--bg-card);
      border: 0;
      border-radius: 12px;
      box-shadow: inset 0 0 0 1px var(--border);
      padding: 28px;
      line-height: 1.8;
      font-size: 15px;
    }

    .article-body h1,
    .article-body h2,
    .article-body h3 {
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      line-height: 1.3;
      color: var(--text-primary);
    }

    .article-body h2 {
      font-size: 20px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-muted);
    }

    .article-body h3 { font-size: 17px; }

    .article-body p { margin: 0 0 1em; }

    .article-body ul, .article-body ol {
      margin: 0 0 1em 1.5em;
    }

    .article-body li { margin: 0.4em 0; }

    .article-body strong { color: var(--text-primary); }

    .article-body a { border-bottom: 1px solid transparent; }
    .article-body a:hover { border-bottom-color: var(--accent); }

    .article-body pre {
      background: #121212;
      border: 0;
      border-radius: 12px;
      box-shadow: inset 0 0 0 1px #303030;
      padding: 20px;
      margin: 20px 0;
      overflow-x: auto;
      max-width: 100%;
    }
    .article-body table {
      display: block;
      width: max-content;
      max-width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .article-body code {
      background: #202020;
      border: 0;
      box-shadow: inset 0 0 0 1px #303030;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.88em;
      overflow-wrap: anywhere;
    }

    .article-body pre code {
      background: none;
      border: none;
      box-shadow: none;
      padding: 0;
      font-size: 13.5px;
      line-height: 1.65;
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
    }
  
    /* clipboard-benchmark diagrams */
    .bm-wrap{margin:22px 0;}
    .bm-h{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#707070;font-weight:600;margin:0 0 10px;}
    .bm-funnel{display:flex;flex-direction:column;gap:7px;}
    .bm-frow{display:flex;align-items:center;gap:12px;}
    .bm-fbar{height:38px;border-radius:8px;display:flex;align-items:center;padding:0 14px;color:#fff;font-weight:500;font-size:14px;white-space:nowrap;box-shadow:inset 0 0 0 1px #303030;}
    .bm-fmeta{font-size:12.5px;color:#9a9a9a;}
    .bm-fmeta b{color:#d6d6d6;font-weight:600;}
    .bm-bars{display:flex;flex-direction:column;gap:9px;}
    .bm-brow{display:grid;grid-template-columns:172px 1fr 34px;align-items:center;gap:12px;font-size:13px;}
    .bm-blabel{color:#c4c4c4;text-align:right;}
    .bm-btrack{background:#202020;border-radius:8px;height:20px;overflow:hidden;border:0;box-shadow:inset 0 0 0 1px #303030;}
    .bm-bfill{height:100%;border-radius:8px;}
    .bm-bval{color:#fff;font-variant-numeric:tabular-nums;font-weight:500;}
    .bm-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;}
    .bm-card{background:#121212;border:0;border-radius:12px;padding:14px 15px;box-shadow:inset 0 0 0 1px #303030,inset 0 3px 0 #505050;}
    .bm-card h4{margin:0 0 2px;font-size:15px;color:#fff;}
    .bm-card .prov{font-size:11px;color:#6f6f6f;margin-bottom:10px;}
    .bm-stat{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;border-bottom:1px solid #1d1d1d;}
    .bm-stat:last-of-type{border-bottom:none;}
    .bm-stat .k{color:#a0a0a0;}.bm-stat .v{color:#fff;font-weight:500;}
    .bm-verdict{margin-top:9px;font-size:12px;line-height:1.5;color:#b6b6b6;border-top:1px solid #2c2c2c;padding-top:8px;}
    .bm-flow{display:flex;flex-wrap:wrap;gap:0;align-items:stretch;margin:6px 0;}
    .bm-fb{flex:1;min-width:120px;background:#121212;border:0;border-radius:12px;padding:11px 13px;font-size:12.5px;color:#d0d0d0;box-shadow:inset 0 0 0 1px #303030;}
    .bm-fb b{color:#fff;display:block;font-size:13.5px;margin-bottom:2px;}
    .bm-arrow{display:flex;align-items:center;color:#5a5a5a;font-size:20px;padding:0 8px;}
    .bm-split{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:680px){.bm-split{grid-template-columns:1fr;}}
    .bm-good{border-left:3px solid #7BC96F;}.bm-bad{border-left:3px solid #DC3545;}
    .bm-tag{display:inline-block;font-size:12px;font-weight:500;padding:2px 7px;border-radius:6px;margin-left:6px;vertical-align:middle;}
    .bm-tag.run{background:#7BC96F0A;color:#7BC96F;}
    .bm-tag.crash{background:#DC35450A;color:#DC3545;}
    .bm-heat{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;}
    .bm-heat th{background:#161616;color:#808080;font-size:11px;text-transform:uppercase;letter-spacing:.8px;padding:8px 6px;border-bottom:1px solid #303030;}
    .bm-heat td{padding:5px 7px;text-align:center;border-bottom:1px solid #1a1a1a;font-variant-numeric:tabular-nums;}
    .bm-heat .h-rank{color:#6f6f6f;}.bm-heat .h-name{text-align:left;}
    .bm-heat .h-name a{color:#d6d6d6;text-decoration:none;}.bm-heat .h-name a:hover{color:#5B9FEF;}
    .bm-heat tbody tr:hover td{background:#161616;}
    .h-emer{background:#7BC96F1A;color:#b8dfb2;font-weight:500;}
    .h-blue{background:#5B9FEF1A;color:#b4d3f7;font-weight:500;}
    .h-amber{background:#F59E421A;color:#f3c892;font-weight:500;}
    .h-red{background:#DC35451A;color:#e59aa1;font-weight:500;}
    .h-dim{color:#5a5a5a;}
    .bm-cta{display:inline-block;margin:4px 0 2px;padding:8px 16px;background:#5B9FEF;color:#fff;font-weight:500;font-size:13.5px;border-radius:8px;text-decoration:none;}
    .bm-cta:hover{background:#4a8ed8;color:#fff;}
    .fbchips{display:flex;flex-wrap:wrap;gap:8px;}
    .fbchip{display:inline-flex;flex-direction:column;background:#121212;border:0;border-radius:8px;padding:7px 11px;font-size:12.5px;box-shadow:inset 0 0 0 1px #303030,inset 3px 0 0 #7BC96F;}
    .fbchip a{color:#fff;font-weight:600;text-decoration:none;}.fbchip a:hover{color:#5B9FEF;}
    .fbchip .fbwas{color:#7f7f7f;font-size:10.5px;margin-top:1px;}
    .ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
    .gcard{background:#121212;border:0;border-radius:12px;overflow:hidden;text-decoration:none;display:block;box-shadow:inset 0 0 0 1px #303030;transition:transform .15s,box-shadow .15s;}
    .gcard:hover{transform:translateY(-4px);box-shadow:inset 0 0 0 1px #505050,0 10px 28px rgba(0,0,0,.45);}
    .gshot{padding:10px 10px 0;}
    .gshot img{width:100%;height:150px;object-fit:cover;object-position:top left;display:block;background:#0f0f0f;border:0;border-radius:8px;box-shadow:inset 0 0 0 1px #303030;}
    .gcap{display:flex;justify-content:space-between;align-items:center;padding:11px 13px 13px;}
    .gname{font-size:13.5px;color:#e6e6e6;font-weight:600;}.gv{font-size:11.5px;font-weight:500;}

    @media (max-width: 680px) {
      .article-container { padding: 14px 12px; }
      .article-body { padding: 16px; font-size: 14.5px; }
      .article-title { font-size: 21px; }
      .article-body pre { padding: 13px; }
      .article-body table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .bm-heat { font-size: 11.5px; }
      .bm-heat td, .bm-heat th { padding: 5px 4px; }
      .bm-brow { grid-template-columns: 104px 1fr 30px; gap: 8px; }
      .bm-cards { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

    <header class="article-header">
      <div class="article-date" id="article-date">Loading...</div>
      <h1 class="article-title" id="article-title">Loading...</h1>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');

    async function fetchManifest() {
      const response = await fetch('posts/posts.json');
      if (!response.ok) throw new Error('Manifest missing');
      return response.json();
    }

    function applyMetadata(meta) {
      if (meta?.title) {
        document.getElementById('article-title').textContent = meta.title;
        document.title = meta.title + ' - AHKv2 & LLMs';
      }

      if (meta?.date) {
        const date = new Date(meta.date).toLocaleDateString(undefined, {
          year: 'numeric', month: 'long', day: 'numeric'
        });
        document.getElementById('article-date').textContent = date;
      }

      if (meta?.tags?.length) {
        document.getElementById('article-tags').innerHTML =
          meta.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
      }
    }

    async function renderPost(path, meta) {
      try {
        const response = await fetch(path);
        if (!response.ok) throw new Error('Post not found');
        const markdown = await response.text();

        marked.use(markedHighlight.markedHighlight({
          langPrefix: 'hljs language-',
          highlight: function(code, lang) {
            // Map cpp/ahk fences to ahk2 grammar
            var mapped = (lang === 'cpp' || lang === 'ahk') ? 'ahk2' : lang;
            if (mapped && hljs.getLanguage(mapped)) {
              return hljs.highlight(code, { language: mapped }).value;
            }
            // Default: use ahk2 for untagged blocks
            return hljs.highlight(code, { language: 'ahk2' }).value;
          }
        }));

        marked.setOptions({
          breaks: true,
          gfm: true
        });

        const html = marked.parse(markdown);
        document.getElementById('content').classList.remove('loading');
        document.getElementById('content').innerHTML = html;
        if (meta) applyMetadata(meta);
        if (slug === 'ahk-eval-benchmark' && window.enhanceAhkEvalArticle) {
          try {
            await window.enhanceAhkEvalArticle();
          } catch (visualError) {
            console.error('AHK-Eval visual enhancement unavailable:', visualError);
          }
        }
      } catch (error) {
        document.getElementById('content').innerHTML = `<p>Error: ${error.message}</p>`;
      }
    }

    async function init() {
      const postsNav = document.querySelector('a[href="index.html#articles"]');
      if (postsNav) {
        postsNav.classList.add('active');
        postsNav.setAttribute('aria-current', 'page');
      }
      if (!slug) {
        document.getElementById('content').innerHTML = '<p>No post specified.</p>';
        return;
      }

      try {
        const manifest = await fetchManifest();
        const meta = manifest.find(entry => entry.slug === slug);
        if (!meta) throw new Error('Post not found');
        renderPost(meta.path, meta);
      } catch (error) {
        document.getElementById('content').innerHTML = `<p>Error: ${error.message}</p>`;
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
